name: Check Kubernetes Version
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
permissions:
  contents: "write"
  pull-requests: "write"
jobs:
  check-k8s-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get Kubernetes version from nixpkgs master
        id: k8s-version
        run: |
          K8S_FILE_URL="https://raw.githubusercontent.com/NixOS/nixpkgs/master/pkgs/by-name/ku/kubernetes/package.nix"
          K8S_FILE=$(curl -sL "$K8S_FILE_URL")

          # Extract version from line 26 - format is like: pname = "kubernetes"; version = "v1.35.3";
          VERSION=$(echo "$K8S_FILE" | sed -n '26p' | grep -oP 'version = "\K[^"]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Found Kubernetes version: $VERSION"

          # Get the current nixpkgs master commit SHA
          NIXPKGS_COMMIT=$(curl -sL "https://api.github.com/repos/NixOS/nixpkgs/commits/master" | jq -r '.sha')
          echo "nixpkgs_revision=$NIXPKGS_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Nixpkgs master revision: $NIXPKGS_COMMIT"
      - name: Check if pin already exists
        id: check-pin
        run: |
          VERSION="${{ steps.k8s-version.outputs.version }}"
          NIXPKGS_REV="${{ steps.k8s-version.outputs.nixpkgs_revision }}"
          PIN_NAME="nixpkgs-k8s-$VERSION"

          if jq -e ".pins[\"$PIN_NAME\"]" npins/sources.json > /dev/null 2>&1; then
            echo "Pin $PIN_NAME already exists"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Pin $PIN_NAME does not exist - will create"
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "pin_name=$PIN_NAME" >> "$GITHUB_OUTPUT"
            echo "nixpkgs_rev=$NIXPKGS_REV" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub App Token
        if: steps.check-pin.outputs.exists == 'false'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - name: Install Nix
        if: steps.check-pin.outputs.exists == 'false'
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=flake:nixpkgs
          extra_nix_config: |
            fallback = true
            trusted-public-keys = didactiklabs-nixcache:PxLKN0+ZkP07M8g8/B6xbP6A4MYpqQg6LH7V3muiy/0= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://s3.didactiklabs.io/nix-cache https://cache.nixos.org/
      - name: Add Kubernetes pin
        if: steps.check-pin.outputs.exists == 'false'
        run: |
          PIN_NAME="${{ steps.check-pin.outputs.pin_name }}"
          NIXPKGS_REV="${{ steps.check-pin.outputs.nixpkgs_rev }}"

          nix run nixpkgs#npins -- add github NixOS nixpkgs \
            --name "$PIN_NAME" \
            --branch "master" --frozen \
            --at "$NIXPKGS_REV"

          echo "Added pin $PIN_NAME at revision $NIXPKGS_REV"
      - name: Create Pull Request
        if: steps.check-pin.outputs.exists == 'false'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(deps): add kubernetes pin for ${{ steps.k8s-version.outputs.version }}"
          title: "chore(deps): add kubernetes pin for ${{ steps.k8s-version.outputs.version }}"
          body: |
            This PR adds a frozen npins pin for Kubernetes version `${{ steps.k8s-version.outputs.version }}`.

            - Nixpkgs revision: `${{ steps.check-pin.outputs.nixpkgs_rev }}`
            - Source: [pkgs/by-name/ku/kubernetes/package.nix](https://github.com/NixOS/nixpkgs/blob/master/pkgs/by-name/ku/kubernetes/package.nix)
          branch: "k8s-pin-${{ steps.k8s-version.outputs.version }}"
          delete-branch: true
      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: rebase
      - name: No update needed
        if: steps.check-pin.outputs.exists == 'true'
        run: |
          echo "Kubernetes version ${{ steps.k8s-version.outputs.version }} already has a pin - no action needed"
